<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Principal for a Day: AI Crisis Command</title>
<style>
:root{--bg:#0f172a;--panel:#111827;--card:#1f2937;--muted:#94a3b8;--text:#f8fafc;--accent:#38bdf8;--good:#22c55e;--warn:#f59e0b;--bad:#ef4444;--line:#334155}*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#0f172a,#111827);color:var(--text)}.app{max-width:1200px;margin:0 auto;padding:20px;display:grid;grid-template-columns:320px 1fr;gap:18px}header{grid-column:1/-1;background:rgba(31,41,55,.85);border:1px solid var(--line);border-radius:18px;padding:18px 22px;box-shadow:0 10px 30px rgba(0,0,0,.25)}h1{margin:0;font-size:28px}.tag{color:var(--muted);margin-top:6px}.badge{display:inline-block;background:#7f1d1d;color:white;padding:4px 9px;border-radius:999px;margin-left:8px;font-size:12px;letter-spacing:.04em}.sidebar{background:rgba(17,24,39,.92);border:1px solid var(--line);border-radius:18px;padding:16px;height:max-content;position:sticky;top:14px}.main{background:rgba(17,24,39,.72);border:1px solid var(--line);border-radius:18px;padding:18px;min-height:650px}.metric{margin:12px 0}.metric-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;color:#dbeafe}.bar{height:10px;background:#334155;border-radius:999px;overflow:hidden}.fill{height:100%;width:75%;background:linear-gradient(90deg,var(--bad),var(--warn),var(--good));transition:width .5s}.card{background:rgba(31,41,55,.85);border:1px solid var(--line);border-radius:16px;padding:18px;margin:14px 0}.alert{border-color:#ef4444;box-shadow:0 0 0 1px rgba(239,68,68,.25)}.success{border-color:#22c55e}.npc{display:flex;gap:12px;align-items:flex-start}.avatar{min-width:44px;width:44px;height:44px;border-radius:50%;display:grid;place-items:center;background:#0ea5e9;font-weight:800}.avatar.red{background:#dc2626}.avatar.green{background:#16a34a}.avatar.yellow{background:#ca8a04}.avatar.purple{background:#7c3aed}.name{font-weight:800}.role{color:var(--muted);font-size:13px;margin-top:2px}.message{margin-top:9px;line-height:1.5}.choices{display:grid;gap:10px;margin-top:16px}button.choice,button.primary,button.secondary{border:1px solid var(--line);background:#1e293b;color:var(--text);padding:13px 14px;border-radius:12px;text-align:left;cursor:pointer;font-size:15px;transition:.2s}button.choice:hover,button.primary:hover,button.secondary:hover{transform:translateY(-1px);border-color:var(--accent);background:#243244}.primary{text-align:center!important;background:#075985!important}.secondary{text-align:center!important;background:#374151!important;margin-right:8px}.small{font-size:13px;color:var(--muted)}textarea{width:100%;min-height:110px;background:#0f172a;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:12px;font-family:inherit;font-size:14px}.log{max-height:210px;overflow:auto;font-size:13px;color:#d1d5db;border-top:1px solid var(--line);margin-top:14px;padding-top:10px}.log div{padding:4px 0;border-bottom:1px dotted rgba(148,163,184,.15)}.pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:5px 9px;margin:4px;color:#e2e8f0;background:#0f172a}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.end-title{font-size:30px;margin:0 0 10px}.score{font-size:42px;font-weight:900;color:var(--accent)}@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{position:relative;top:auto}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<header><h1>Principal for a Day: AI Crisis Command <span class="badge">Fixed Prototype v1.1</span></h1><div class="tag">An immersive ethical leadership and AI literacy simulator for EDAD 5300</div></header>
<aside class="sidebar"><h3>Leadership Dashboard</h3><div id="metrics"></div><div class="card"><div class="small">Current Time</div><div id="clock" style="font-size:24px;font-weight:800">7:15 AM</div></div><div class="card"><div class="small">Inventory</div><div id="inventory"></div></div><div class="log" id="log"><b>Decision Log</b></div></aside>
<main class="main" id="main"></main>
</div>
<script>
(function(){
'use strict';
const state={scene:0,time:'7:15 AM',confidence:'',notes:{},metrics:{'Student Safety':75,'Student Rights':75,'Parent Trust':75,'School Climate':75,'Legal Risk':50,'AI Reliability':40},flags:{reviewedContext:false,usedAI:false,verifiedAI:false,consultedCounselor:false,notifiedParents:false,checkedPolicy:false,suspended:false,supportive:false},log:[]};
const actions={};
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function clamp(n){return Math.max(0,Math.min(100,n));}
function change(delta){Object.keys(delta||{}).forEach(k=>state.metrics[k]=clamp((state.metrics[k]||0)+delta[k]));}
function addLog(t){state.log.push(`${state.time} — ${t}`);}
function setTime(t){state.time=t;}
function register(fn){const id='a'+Math.random().toString(36).slice(2);actions[id]=fn;return id;}
function btn(text,fn,sub=''){const id=register(fn);return `<button type="button" class="choice" data-action="${id}"><b>${esc(text)}</b>${sub?`<div class="small">${esc(sub)}</div>`:''}</button>`;}
function primary(text,fn){const id=register(fn);return `<button type="button" class="primary" data-action="${id}">${esc(text)}</button>`;}
function npc(letter,name,role,msg,color=''){return `<div class="card npc"><div class="avatar ${color}">${esc(letter)}</div><div><div class="name">${esc(name)}</div><div class="role">${esc(role)}</div><div class="message">${esc(msg)}</div></div></div>`;}
function inv(){let items=['SafeWatch Alert']; if(state.flags.reviewedContext)items.push('Full Writing Context'); if(state.flags.consultedCounselor)items.push('Counselor Notes'); if(state.flags.checkedPolicy)items.push('District Policy'); if(state.flags.verifiedAI)items.push('AI Critique'); document.getElementById('inventory').innerHTML=items.map(i=>`<span class="pill">${esc(i)}</span>`).join('');}
function renderMetrics(){document.getElementById('metrics').innerHTML=Object.keys(state.metrics).map(k=>{const v=state.metrics[k];return `<div class="metric"><div class="metric-row"><span>${esc(k)}</span><b>${v}</b></div><div class="bar"><div class="fill" style="width:${v}%"></div></div></div>`}).join('');}
function renderLog(){document.getElementById('log').innerHTML='<b>Decision Log</b>'+state.log.map(x=>`<div>${esc(x)}</div>`).join('');}
function pick(label,delta,next,flag){if(flag)state.flags[flag]=true;change(delta);addLog(label);go(next);}
function saveNote(key,next){const note=document.getElementById('note');state.notes[key]=note?note.value:'';addLog('Submitted artifact: '+key);go(next);}
function go(n){state.scene=n;render();}
function draw(html){document.getElementById('main').innerHTML=html;document.getElementById('clock').textContent=state.time;renderMetrics();renderLog();inv();}
document.addEventListener('click',e=>{const b=e.target.closest('[data-action]');if(!b)return;const fn=actions[b.getAttribute('data-action')];if(fn)fn();});
function render(){
 actionsClear();
 if(state.scene===0){return draw(`<div class="card success"><h2>Mission Brief</h2><p>You are the principal of Clearwater Middle School. Today, you will respond to an AI-generated student safety alert while balancing student safety, privacy, due process, equity, and professional judgment.</p><p>Your goal is not to find a single perfect answer. Your goal is to lead responsibly under uncertainty.</p></div><div class="card"><h3>Before beginning</h3><p>How confident are you in making decisions involving AI in schools?</p><div class="choices">${['Not Confident','Slightly Confident','Moderately Confident','Very Confident','Extremely Confident'].map(x=>btn(x,()=>{state.confidence=x;addLog('Initial confidence: '+x);go(1);})).join('')}</div></div>`);}
 if(state.scene===1){setTime('7:15 AM');return draw(`<div class="card alert"><h2>SAFEWATCH AI ALERT</h2><p><b>Risk Level:</b> High<br><b>Student:</b> Jordan Martinez, Grade 8<br><b>AI Confidence:</b> 87%</p><p>Flagged phrases: “Nobody listens.” “They will regret it.” “I am done being ignored.”</p></div>${npc('A','Assistant Principal Reed','Assistant Principal','SafeWatch says this is high risk. I can remove Jordan from class immediately and search the backpack.','red')}<div class="card"><h3>Decision Point 1: First Move</h3><div class="choices">${btn('Remove Jordan immediately',()=>pick('Removed Jordan immediately',{'Student Safety':10,'Student Rights':-12,'Parent Trust':-8,'Legal Risk':8},2))}${btn('Ask counselor to check in first',()=>pick('Consulted counselor before removal',{'Student Safety':4,'Student Rights':8,'Parent Trust':3,'Legal Risk':-4},3,'consultedCounselor'))}${btn('Review full writing context before acting',()=>pick('Reviewed full context first',{'Student Rights':12,'AI Reliability':10,'Student Safety':-4,'Legal Risk':-5},4,'reviewedContext'))}${btn('Interview Jordan privately with counselor present',()=>pick('Interviewed Jordan with counselor',{'Student Safety':5,'Student Rights':10,'School Climate':5,'Legal Risk':-6},3,'consultedCounselor'))}</div></div>`);}
 if(state.scene===2){setTime('7:30 AM');return draw(`${npc('A','Assistant Principal Reed','Assistant Principal','Jordan has been removed from class. I also searched the backpack. Nothing dangerous was found.','red')}<div class="card alert"><h3>Consequence</h3><p>You acted quickly for safety, but the search and removal may raise due process, privacy, and proportionality questions.</p></div><div class="card"><h3>Decision Point 2: Backpack Search</h3><div class="choices">${btn('Approve the search and maintain emergency response',()=>pick('Approved search and emergency response',{'Student Safety':5,'Student Rights':-10,'Parent Trust':-8,'Legal Risk':12},5))}${btn('Pause discipline and investigate legality',()=>pick('Paused discipline to investigate legality',{'Student Rights':12,'Legal Risk':-10,'Parent Trust':5},5,'checkedPolicy'))}${btn('Notify parents and document the reason for search',()=>pick('Notified parents and documented search rationale',{'Parent Trust':8,'Legal Risk':-5,'Student Rights':5},5,'notifiedParents'))}</div></div>`);}
 if(state.scene===3){setTime('7:35 AM');return draw(`${npc('C','Ms. Lee','School Counselor','Jordan has seemed withdrawn lately. There may be bullying involved. I recommend a supportive check-in before any discipline.','green')}<div class="card"><h3>Stakeholder Pressure</h3><p>You have new information, but the superintendent wants a quick update and the assistant principal is asking for direction.</p><div class="choices">${btn('Prioritize safety and remove Jordan temporarily',()=>pick('Temporarily removed Jordan after counselor input',{'Student Safety':8,'Student Rights':-4,'School Climate':2},5))}${btn('Conduct a supportive interview before discipline',()=>pick('Conducted supportive interview',{'Student Safety':6,'Student Rights':10,'Parent Trust':5,'Legal Risk':-7},5))}${btn('Request full AI alert data and writing context',()=>pick('Requested full AI alert data and writing context',{'AI Reliability':15,'Student Rights':10,'Legal Risk':-8},4,'reviewedContext'))}</div></div>`);}
 if(state.scene===4){setTime('7:42 AM');return draw(`${npc('T','Mr. Owens','Language Arts Teacher','Jordan has been working on a fictional short story. The phrases may be part of the assignment.','yellow')}<div class="card success"><h3>New Evidence</h3><p>The AI alert may have detected concerning language without understanding context.</p></div><div class="card"><h3>Initial Risk Analysis Artifact</h3><p>Write 2–3 sentences: What concerns you most right now?</p><textarea id="note" placeholder="Example: I am concerned about safety, but I also need to verify context before relying on AI-generated evidence..."></textarea>${primary('Submit and Continue',()=>saveNote('Initial Risk Analysis',5))}</div>`);}
 if(state.scene===5){setTime('8:05 AM');return draw(`${npc('P','Mrs. Martinez','Jordan’s Parent','Why was my child pulled from class? Was this based only on an algorithm? I want answers.','purple')}${npc('S','Dr. Chen','Superintendent','I need a short update. Did we overreact, or did we do the right thing?','red')}<div class="card"><h3>Stakeholder Analysis Artifact</h3><p>Select the stakeholder who currently has the least voice and explain your responsibility to them.</p><textarea id="note" placeholder="Identify stakeholder, likely impact, and principal responsibility..."></textarea>${primary('Submit Stakeholder Analysis',()=>saveNote('Stakeholder Impact Map',6))}</div>`);}
 if(state.scene===6){setTime('8:20 AM');return draw(`<div class="card"><h2>AI Advisor Available</h2><p>You may consult <b>Dr. Athena</b>, an AI educational leadership consultant. Remember: AI can support analysis, but it cannot replace your professional judgment.</p><div class="choices">${btn('Ask Dr. Athena for guidance',()=>{state.flags.usedAI=true;change({'AI Reliability':10});addLog('Consulted Dr. Athena AI Advisor');go(7);},'Receive AI-generated legal, ethical, and leadership advice.')}${btn('Skip AI and rely on human team only',()=>pick('Skipped AI advisor',{'AI Reliability':-5,'Student Rights':3},8))}</div></div>`);}
 if(state.scene===7){setTime('8:28 AM');return draw(`${npc('AI','Dr. Athena','AI Educational Leadership Consultant','Based on the alert, the school should prioritize safety, document all actions, verify the original writing context, avoid relying solely on automated detection, consult district policy, communicate carefully with parents, and consider supportive intervention if the threat is not substantiated.','green')}<div class="card alert"><h3>Fact Check Mode</h3><p>Before acting, critique the AI output.</p><textarea id="note" placeholder="What is useful? What must be verified? What assumptions did AI make? What legal uncertainty remains?"></textarea>${primary('Submit AI Critique',()=>{state.flags.verifiedAI=true;change({'AI Reliability':25,'Legal Risk':-8,'Student Rights':10});addLog('Completed AI critique and verification check');go(8);})}</div>`);}
 if(state.scene===8){setTime('9:00 AM');return draw(`${npc('T','Mr. Owens','Language Arts Teacher','I confirmed the flagged phrases came from Jordan’s fictional story draft. The assignment was about a character feeling unheard.','yellow')}${npc('C','Ms. Lee','School Counselor','Jordan also reported feeling embarrassed and afraid of being labeled dangerous.','green')}<div class="card"><h3>Ethical and Legal Analysis Artifact</h3><p>Explain the central ethical tension and the legal/policy issues you must review before final action.</p><textarea id="note" placeholder="Privacy vs. safety; due process; search and seizure; student expression; district AI monitoring policy..."></textarea>${primary('Submit Analysis',()=>saveNote('Ethical and Legal Analysis',9))}</div>`);}
 if(state.scene===9){setTime('10:15 AM');return draw(`<div class="card alert"><h2>Final Boss: Principal Decision</h2><p>The superintendent is waiting. Jordan’s parent wants a response. Staff need guidance. You must choose a final action.</p><div class="choices">${btn('Maintain suspension pending investigation',()=>{state.flags.suspended=true;change({'Student Safety':8,'Student Rights':-20,'Parent Trust':-15,'Legal Risk':15});addLog('Final decision selected: maintain suspension');go(10);},'Prioritizes visible safety response but increases rights and trust concerns.')}${btn('Remove suspension and document AI/context error',()=>{change({'Student Rights':15,'Parent Trust':5,'Student Safety':-5,'Legal Risk':-5});addLog('Final decision selected: remove suspension');go(10);},'Protects due process but requires careful communication about safety review.')}${btn('Replace discipline with supportive intervention and policy review',()=>{state.flags.supportive=true;change({'Student Safety':10,'Student Rights':15,'Parent Trust':10,'School Climate':8,'Legal Risk':-10});addLog('Final decision selected: supportive intervention and policy review');go(10);},'Balances safety, well-being, due process, and AI oversight.')}</div></div>`);}
 if(state.scene===10){setTime('11:00 AM');return draw(`<div class="card"><h2>Decision Memorandum</h2><p>Write your principal decision memo. Include: final action, ethical justification, legal justification, stakeholder considerations, risks, and limitations of AI evidence.</p><textarea id="note" style="min-height:160px" placeholder="Decision Memo..."></textarea>${primary('Submit Memo',()=>saveNote('Principal Decision Memorandum',11))}</div>`);}
 if(state.scene===11){setTime('1:30 PM');return draw(`<div class="card"><h2>District AI Monitoring Policy Brief</h2><p>Recommend a policy for AI monitoring systems. Address human oversight, alert verification, due process, parent communication, equity/bias review, privacy, and staff training.</p><textarea id="note" style="min-height:170px" placeholder="Policy Recommendation..."></textarea>${primary('Submit Policy Brief',()=>saveNote('AI Governance Policy Brief',12))}</div>`);}
 if(state.scene===12){const avg=Math.round(Object.values(state.metrics).reduce((a,b)=>a+b,0)/6);const ending=avg>=75?'Ethical AI Leader':avg>=62?'Balanced but Developing Leader':state.metrics['Student Rights']<45?'Reactive Leader':'AI-Dependent or Incomplete Leader';return draw(`<div class="card success"><h2 class="end-title">Ending: ${esc(ending)}</h2><div class="score">${avg}/100</div><p>This score reflects your balance across safety, rights, trust, climate, legal risk, and AI reliability.</p></div><div class="grid2"><div class="card"><h3>Your Artifacts</h3>${Object.keys(state.notes).map(k=>`<p><b>${esc(k)}</b><br><span class="small">${esc((state.notes[k]||'').slice(0,180))}${(state.notes[k]||'').length>180?'...':''}</span></p>`).join('')}</div><div class="card"><h3>Final Reflection</h3><p>What did you learn about using AI responsibly as a school leader?</p><textarea id="note" placeholder="Final reflection..."></textarea>${primary('Complete Simulation',()=>saveNote('Final Reflection',13))}</div></div>`);}
 if(state.scene===13){return draw(`<div class="card success"><h2>Simulation Complete</h2><p>You completed the Ethical Leadership Crisis Simulator.</p><p><b>Initial confidence:</b> ${esc(state.confidence)}</p><p>Use your decision log and artifacts to support class discussion or Canvas submission.</p><button type="button" class="secondary" data-action="${register(()=>window.print())}">Print / Save as PDF</button><button type="button" class="secondary" data-action="${register(()=>location.reload())}">Restart</button></div>`);}
}
function actionsClear(){Object.keys(actions).forEach(k=>delete actions[k]);}
render();
})();
</script>
</body>
</html>
